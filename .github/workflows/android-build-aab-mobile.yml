name: Android Mobile AAB (Play Store)

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:  # Permet de déclencher manuellement depuis l'interface GitHub

jobs:
  build-android-mobile-aab:
    runs-on: self-hosted
    environment: production
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro frontend
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-33 build-tools;33.0.0 ndk;25.2.9519653'

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Setup NDK environment variables
        run: |
          # Find NDK directory (try specific version first, then any version)
          NDK_PATH=$(find $ANDROID_HOME/ndk -maxdepth 1 -type d -name "25.2.9519653" 2>/dev/null | head -n 1)
          if [ -z "$NDK_PATH" ]; then
            # Fallback: find any NDK version
            NDK_PATH=$(find $ANDROID_HOME/ndk -maxdepth 1 -type d 2>/dev/null | head -n 1)
          fi
          if [ -n "$NDK_PATH" ]; then
            echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
            echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
            echo "Found NDK at: $NDK_PATH"
          else
            echo "Warning: NDK not found in $ANDROID_HOME/ndk"
            ls -la $ANDROID_HOME/ndk/ || echo "NDK directory does not exist"
          fi

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Setup Android environment variables
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/tools" >> $GITHUB_PATH

      - name: Initialize Android project
        run: |
          echo "Checking if Android project exists..."
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_NDK_HOME: $ANDROID_NDK_HOME"
          echo "NDK_HOME: $NDK_HOME"
          if [ ! -d "src-tauri/gen/android" ]; then
            echo "Android project not found, initializing..."
            npx tauri android init --ci --config src-tauri/tauri.android.mobile.conf.json
            echo "Android project initialized"
          else
            echo "Android project already exists"
          fi
          ls -la src-tauri/gen/ || echo "gen directory does not exist"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
          CARGO_TERM_COLOR: always

      - name: Setup signing keystore
        run: |
          echo "🔐 Configuration de la signature native..."
          ANDROID_DIR="src-tauri/gen/android"
          mkdir -p "$ANDROID_DIR"
          
          # Vérifier que les secrets de signature sont configurés
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] || [ -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ]; then
            echo "❌ Secrets de signature manquants."
            echo "   Configure au minimum:"
            echo "   - ANDROID_KEYSTORE_BASE64"
            echo "   - ANDROID_KEYSTORE_PASSWORD"
            echo "   - (optionnel) ANDROID_KEY_PASSWORD"
            exit 1
          fi
          
          # Décoder le keystore depuis les secrets GitHub
          echo "📥 Décodage du keystore depuis les secrets GitHub..."
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$ANDROID_DIR/keystore.jks"
          echo "✅ Keystore de production décodé et prêt"
          
          # Créer le fichier keystore.properties
          KEYSTORE_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          KEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}"
          
          if [ -z "$KEY_PASSWORD" ]; then
            KEY_PASSWORD="$KEYSTORE_PASSWORD"
          fi
          
          cat > "$ANDROID_DIR/keystore.properties" << EOF
          # Configuration du keystore pour la signature de l'AAB
          # Généré automatiquement par GitHub Actions
          
          storeFile=keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=popcorn-key
          keyPassword=$KEY_PASSWORD
          EOF
          
          echo "✅ Fichier keystore.properties créé"

      - name: Apply signing configuration to build.gradle.kts
        run: |
          echo "🔧 Application de la configuration de signature..."
          BUILD_GRADLE="src-tauri/gen/android/app/build.gradle.kts"
          
          if [ ! -f "$BUILD_GRADLE" ]; then
            echo "⚠️  build.gradle.kts non trouvé, attente..."
            for i in {1..30}; do
              if [ -f "$BUILD_GRADLE" ]; then
                break
              fi
              sleep 1
            done
          fi
          
          if [ ! -f "$BUILD_GRADLE" ]; then
            echo "❌ build.gradle.kts introuvable après attente"
            exit 1
          fi
          
          # Vérifier si la configuration existe déjà
          if grep -q "signingConfigs" "$BUILD_GRADLE"; then
            echo "✅ Configuration de signature déjà présente"
          else
            echo "📝 Ajout de la configuration de signature..."
            
            # Appliquer la configuration de signature
            python3 scripts/apply-signing-config.py "$BUILD_GRADLE"
            
            echo "✅ Configuration appliquée avec succès"
          fi

      - name: Build Android AAB
        run: npm run tauri:build:android-mobile:aab
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
          CARGO_TERM_COLOR: always

      - name: Find AAB file
        id: find-aab
        run: |
          echo "🔍 Recherche de l'AAB généré..."
          echo "Recherche dans les emplacements possibles..."
          
          # 1. Chercher dans gen/android/app/build/outputs/bundle (emplacement Gradle standard)
          AAB_PATH=$(find src-tauri/gen/android/app/build/outputs/bundle -name "*.aab" -type f 2>/dev/null | head -n 1)
          if [ -n "$AAB_PATH" ]; then
            echo "✅ AAB trouvé dans gen/android/app/build/outputs/bundle"
          fi
          
          # 2. Chercher dans target (emplacement Tauri)
          if [ -z "$AAB_PATH" ]; then
            AAB_PATH=$(find src-tauri/target/aarch64-linux-android/release -name "*.aab" -type f 2>/dev/null | head -n 1)
            if [ -n "$AAB_PATH" ]; then
              echo "✅ AAB trouvé dans target"
            fi
          fi
          
          # 3. Dernier fallback: chercher partout (sauf node_modules et .git)
          if [ -z "$AAB_PATH" ]; then
            AAB_PATH=$(find . -name "*.aab" -type f -not -path "*/node_modules/*" -not -path "*/.git/*" 2>/dev/null | head -n 1)
            if [ -n "$AAB_PATH" ]; then
              echo "✅ AAB trouvé ailleurs"
            fi
          fi
          
          if [ -z "$AAB_PATH" ]; then
            echo "❌ Aucun AAB trouvé!"
            echo "Recherche dans les répertoires..."
            echo "gen/android/app/build/outputs/bundle:"
            ls -la src-tauri/gen/android/app/build/outputs/bundle/ 2>/dev/null || echo "  (n'existe pas)"
            echo "target/aarch64-linux-android/release:"
            ls -la src-tauri/target/aarch64-linux-android/release/*.aab 2>/dev/null || echo "  (aucun AAB)"
            exit 1
          fi
          
          echo "path=$AAB_PATH" >> $GITHUB_OUTPUT
          echo "✅ AAB trouvé: $AAB_PATH"
          ls -lh "$AAB_PATH"
          echo "Taille: $(du -h "$AAB_PATH" | cut -f1)"

      - name: Verify AAB signature
        run: |
          AAB_PATH="${{ steps.find-aab.outputs.path }}"
          echo "🔍 Vérification de la signature de l'AAB: $AAB_PATH"
          
          # Vérifier avec jarsigner (inclus dans le JDK)
          if jarsigner -verify -certs "$AAB_PATH" > /dev/null 2>&1; then
            echo "✅ AAB signé avec succès"
            jarsigner -verify -certs -verbose "$AAB_PATH" | head -n 10
          else
            echo "❌ ERREUR CRITIQUE: L'AAB n'est pas signé ou la signature est invalide!"
            echo "   Chemin: $AAB_PATH"
            echo "   L'AAB doit être signé avec le keystore de production"
            exit 1
          fi

      - name: Rename AAB with correct format
        id: rename-aab
        run: |
          AAB_PATH="${{ steps.find-aab.outputs.path }}"
          
          # Vérifier que l'AAB est bien signé avant de le renommer
          if ! jarsigner -verify -certs "$AAB_PATH" > /dev/null 2>&1; then
            echo "❌ ERREUR: L'AAB n'est pas signé avant le renommage!"
            echo "   Chemin: $AAB_PATH"
            exit 1
          fi
          echo "✅ AAB vérifié: signature valide"
          
          # Lire la version depuis tauri.android.mobile.conf.json
          PRODUCT_NAME=$(jq -r '.productName' src-tauri/tauri.android.mobile.conf.json)
          VERSION=$(jq -r '.version' src-tauri/tauri.android.mobile.conf.json)
          
          # Nettoyer le nom (remplacer les espaces par des underscores)
          SAFE_NAME=$(echo "$PRODUCT_NAME" | sed 's/ /_/g')
          
          # Nouveau nom: Popcorn_Mobile-v1.0.1.aab
          NEW_AAB_NAME="${SAFE_NAME}-v${VERSION}.aab"
          
          # Créer un dossier temporaire pour le fichier final avec le bon nom
          FINAL_AAB_DIR="./release-aab"
          mkdir -p "$FINAL_AAB_DIR"
          NEW_AAB_PATH="$FINAL_AAB_DIR/$NEW_AAB_NAME"
          
          echo "📝 Copie de l'AAB signé avec le nouveau nom..."
          echo "   Ancien: $(basename "$AAB_PATH")"
          echo "   Nouveau: $NEW_AAB_NAME"
          
          # Copier (pas renommer) pour garder l'original si nécessaire
          cp "$AAB_PATH" "$NEW_AAB_PATH"
          
          # Vérifier que la copie est bien signée
          if jarsigner -verify -certs "$NEW_AAB_PATH" > /dev/null 2>&1; then
            echo "✅ AAB copié et vérifié: signature valide"
          else
            echo "❌ ERREUR: L'AAB copié n'est pas signé!"
            exit 1
          fi
          
          echo "path=$NEW_AAB_PATH" >> $GITHUB_OUTPUT
          echo "name=$NEW_AAB_NAME" >> $GITHUB_OUTPUT
          echo "✅ AAB prêt pour upload Play Store: $NEW_AAB_NAME"

      - name: Verify final AAB before upload
        run: |
          AAB_PATH="${{ steps.rename-aab.outputs.path }}"
          AAB_NAME="${{ steps.rename-aab.outputs.name }}"
          
          echo "🔍 Vérification finale de l'AAB avant upload..."
          echo "   Chemin: $AAB_PATH"
          echo "   Nom: $AAB_NAME"
          
          if [ ! -f "$AAB_PATH" ]; then
            echo "❌ ERREUR: L'AAB n'existe pas: $AAB_PATH"
            exit 1
          fi
          
          # Vérifier la signature
          if jarsigner -verify -certs "$AAB_PATH" > /dev/null 2>&1; then
            echo "✅ AAB signé et prêt pour l'upload Play Store"
            jarsigner -verify -certs -verbose "$AAB_PATH" | head -n 5
          else
            echo "❌ ERREUR: L'AAB final n'est pas signé!"
            exit 1
          fi
          
          echo "✅ AAB validé: $AAB_NAME"
          echo "📦 Taille: $(du -h "$AAB_PATH" | cut -f1)"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: popcorn-android-mobile-aab
          path: ${{ steps.rename-aab.outputs.path }}
          retention-days: 90
          if-no-files-found: error

      - name: Display AAB info
        run: |
          AAB_PATH="${{ steps.rename-aab.outputs.path }}"
          echo "📦 Informations sur l'AAB:"
          echo "   Chemin: $AAB_PATH"
          echo "   Taille: $(du -h "$AAB_PATH" | cut -f1)"
          echo "   Date: $(stat -c %y "$AAB_PATH" 2>/dev/null || stat -f "%Sm" "$AAB_PATH" 2>/dev/null || echo "N/A")"
          echo ""
          echo "✅ L'AAB est disponible dans:"
          echo "   1. Artifacts GitHub (onglet Actions de ce workflow)"
          echo "   2. Prêt pour upload sur Google Play Console"
          echo ""
          echo "📝 Instructions pour upload sur Play Store:"
          echo "   1. Téléchargez l'AAB depuis les Artifacts"
          echo "   2. Connectez-vous à Google Play Console"
          echo "   3. Allez dans Production > Créer une version"
          echo "   4. Téléversez l'AAB"
          echo "   5. Remplissez les notes de version"
          echo "   6. Soumettez pour révision"
