name: Build and Publish Frontend Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'tailwind.config.mjs'
      - 'tsconfig.json'
      - 'Dockerfile'
      - '.github/workflows/docker-publish-frontend.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'tailwind.config.mjs'
      - 'tsconfig.json'
      - 'Dockerfile'
      - '.github/workflows/docker-publish-frontend.yml'
  workflow_dispatch:  # Permet de déclencher manuellement depuis l'interface GitHub

env:
  REGISTRY: docker.io
  IMAGE_NAME: popcorn-frontend

jobs:
  build-and-push:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Nécessaire pour obtenir l'historique complet des commits

      - name: Generate version from commit count
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="0.0.${COMMIT_COUNT}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "commit_count=${COMMIT_COUNT}" >> $GITHUB_OUTPUT
          echo "Generated version: ${VERSION} (from ${COMMIT_COUNT} commits)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker secrets
        if: github.event_name != 'pull_request'
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "❌ Erreur: Les secrets DOCKER_USERNAME et DOCKER_PASSWORD doivent être configurés dans les paramètres du dépôt GitHub"
            echo "Pour configurer les secrets:"
            echo "1. Allez dans Settings > Secrets and variables > Actions"
            echo "2. Ajoutez DOCKER_USERNAME avec votre nom d'utilisateur Docker Hub"
            echo "3. Ajoutez DOCKER_PASSWORD avec votre token d'accès Docker Hub"
            exit 1
          fi
          echo "✅ Secrets Docker configurés correctement"

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: false

      - name: Set Docker image name
        id: docker-image
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ] && [ -n "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "image_name=${{ secrets.DOCKER_USERNAME }}/popcorn-frontend" >> $GITHUB_OUTPUT
          else
            echo "image_name=popcorn-frontend" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.docker-image.outputs.image_name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
            type=sha,prefix=sha-,enable=${{ github.event_name != 'pull_request' }}
            type=ref,event=branch,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr,enable=${{ github.event_name == 'pull_request' }}

      - name: Set Docker cache references
        id: docker-cache
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ] && [ -n "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "cache_from=type=registry,ref=${{ secrets.DOCKER_USERNAME }}/popcorn-frontend:buildcache" >> $GITHUB_OUTPUT
            echo "cache_to=type=registry,ref=${{ secrets.DOCKER_USERNAME }}/popcorn-frontend:buildcache,mode=max" >> $GITHUB_OUTPUT
          else
            echo "cache_from=" >> $GITHUB_OUTPUT
            echo "cache_to=" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: ${{ steps.docker-cache.outputs.cache_from }}
          cache-to: ${{ steps.docker-cache.outputs.cache_to }}
          platforms: linux/amd64,linux/arm64
        continue-on-error: false
