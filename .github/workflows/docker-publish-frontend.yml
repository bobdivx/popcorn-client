name: Build and Publish Frontend Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'tailwind.config.mjs'
      - 'tsconfig.json'
      - 'Dockerfile'
      - '.github/workflows/docker-publish-frontend.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'tailwind.config.mjs'
      - 'tsconfig.json'
      - 'Dockerfile'
      - '.github/workflows/docker-publish-frontend.yml'
  workflow_dispatch:  # Permet de déclencher manuellement depuis l'interface GitHub

env:
  REGISTRY: docker.io
  IMAGE_NAME: popcorn-frontend

jobs:
  build-and-push:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    # NOTE: Si vous utilisez des "Environment secrets" au lieu de "Repository secrets",
    # décommentez la ligne suivante et remplacez 'production' par le nom de votre environnement:
    # environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Nécessaire pour obtenir l'historique complet des commits

      - name: Generate version from commit count
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="0.0.${COMMIT_COUNT}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "commit_count=${COMMIT_COUNT}" >> $GITHUB_OUTPUT
          echo "Generated version: ${VERSION} (from ${COMMIT_COUNT} commits)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker Hub credentials
        id: check_creds
        run: |
          echo "🔍 Checking for Docker Hub credentials..."
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          
          # Essayer secrets.DOCKER_USERNAME d'abord
          DOCKER_USER="${{ secrets.DOCKER_USERNAME }}"
          if [ -n "${DOCKER_USER}" ] && [ "${DOCKER_USER}" != "null" ] && [ "${DOCKER_USER}" != "" ]; then
            echo "✅ Found DOCKER_USERNAME in repository secrets"
            echo "username=${DOCKER_USER}" >> $GITHUB_OUTPUT
            echo "Using Docker Hub username: ${DOCKER_USER}"
            exit 0
          else
            echo "⚠️ secrets.DOCKER_USERNAME is empty or not set"
          fi
          
          # Essayer vars.DOCKERHUB_USERNAME
          DOCKER_USER="${{ vars.DOCKERHUB_USERNAME }}"
          if [ -n "${DOCKER_USER}" ] && [ "${DOCKER_USER}" != "null" ] && [ "${DOCKER_USER}" != "" ]; then
            echo "✅ Found DOCKERHUB_USERNAME in repository variables"
            echo "username=${DOCKER_USER}" >> $GITHUB_OUTPUT
            echo "Using Docker Hub username: ${DOCKER_USER}"
            exit 0
          else
            echo "⚠️ vars.DOCKERHUB_USERNAME is empty or not set"
          fi
          
          # Si aucun n'est trouvé, afficher une erreur détaillée
          echo ""
          echo "❌ ERROR: No Docker Hub username configured!"
          echo ""
          echo "📋 Solution: Copy your Environment secrets to Repository secrets"
          echo ""
          echo "Go to: Settings > Secrets and variables > Actions > Secrets"
          echo "Then add:"
          echo "  - DOCKER_USERNAME (from Environment secrets)"
          echo "  - DOCKER_PASSWORD (from Environment secrets)"
          echo ""
          echo "OR if you want to use Environment secrets, uncomment the 'environment:' line"
          echo "in the workflow and set it to your environment name."
          exit 1

      - name: Check Docker password
        id: check_password
        if: github.event_name != 'pull_request'
        run: |
          echo "🔍 Checking for Docker Hub password/token..."
          
          # Essayer dans l'ordre: vars.DOCKER_PASSWORD, secrets.DOCKER_PASSWORD, secrets.DOCKERHUB_TOKEN
          if [ -n "${{ vars.DOCKER_PASSWORD }}" ] && [ "${{ vars.DOCKER_PASSWORD }}" != "" ]; then
            echo "✅ Found DOCKER_PASSWORD in vars"
            echo "password_source=vars" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          if [ -n "${{ secrets.DOCKER_PASSWORD }}" ] && [ "${{ secrets.DOCKER_PASSWORD }}" != "" ]; then
            echo "✅ Found DOCKER_PASSWORD in secrets"
            echo "password_source=secrets" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          if [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ] && [ "${{ secrets.DOCKERHUB_TOKEN }}" != "" ]; then
            echo "✅ Found DOCKERHUB_TOKEN in secrets"
            echo "password_source=token" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "❌ ERROR: No Docker Hub password/token configured!"
          echo "Please set one of: vars.DOCKER_PASSWORD, secrets.DOCKER_PASSWORD, or secrets.DOCKERHUB_TOKEN"
          exit 1

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ steps.check_creds.outputs.username }}
          password: ${{ vars.DOCKER_PASSWORD != '' && vars.DOCKER_PASSWORD || (secrets.DOCKER_PASSWORD != '' && secrets.DOCKER_PASSWORD || secrets.DOCKERHUB_TOKEN) }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.check_creds.outputs.username }}/popcorn-frontend
          tags: |
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
            type=sha,prefix=sha-,enable=${{ github.event_name != 'pull_request' }}
            type=ref,event=branch,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr,enable=${{ github.event_name == 'pull_request' }}

      - name: Log image info
        if: github.event_name != 'pull_request'
        run: |
          echo "✅ Frontend Docker Image will be published!"
          echo "Repository: ${{ steps.check_creds.outputs.username }}/popcorn-frontend"
          echo "Tags: ${{ join(steps.meta.outputs.tags, ', ') }}"

      - name: Build and push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ steps.check_creds.outputs.username }}/popcorn-frontend:buildcache
          cache-to: type=registry,ref=${{ steps.check_creds.outputs.username }}/popcorn-frontend:buildcache,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Build Docker image (no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64

      - name: Log success
        if: github.event_name != 'pull_request'
        run: |
          echo "✅ Frontend Docker Image published successfully!"
          echo "You can find it at: https://hub.docker.com/r/${{ steps.check_creds.outputs.username }}/popcorn-frontend/tags"
