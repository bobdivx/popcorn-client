name: Build and Publish Frontend Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'tailwind.config.mjs'
      - 'tsconfig.json'
      - 'Dockerfile'
      - '.github/workflows/docker-publish-frontend.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'tailwind.config.mjs'
      - 'tsconfig.json'
      - 'Dockerfile'
      - '.github/workflows/docker-publish-frontend.yml'
  workflow_dispatch:  # Permet de déclencher manuellement depuis l'interface GitHub

env:
  REGISTRY: docker.io
  IMAGE_NAME: popcorn-frontend

jobs:
  build-and-push:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Nécessaire pour obtenir l'historique complet des commits

      - name: Generate version from commit count
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="0.0.${COMMIT_COUNT}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "commit_count=${COMMIT_COUNT}" >> $GITHUB_OUTPUT
          echo "Generated version: ${VERSION} (from ${COMMIT_COUNT} commits)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect Docker credentials
        id: docker-auth
        run: |
          # Par défaut: pas de push
          echo "can_push=false" >> $GITHUB_OUTPUT
          echo "image_name=popcorn-frontend" >> $GITHUB_OUTPUT
          
          # On ne push jamais sur les pull requests
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ℹ️ Pull request: build sans push"
            exit 0
          fi
          
          # Si les secrets ne sont pas là, on build mais on ne push pas (ne pas échouer)
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "⚠️ Secrets Docker manquants: build sans push"
            echo "   Configurez DOCKER_USERNAME et DOCKER_PASSWORD dans GitHub > Settings > Secrets and variables > Actions"
            exit 0
          fi
          
          echo "can_push=true" >> $GITHUB_OUTPUT
          echo "image_name=${{ secrets.DOCKER_USERNAME }}/popcorn-frontend" >> $GITHUB_OUTPUT
          echo "✅ Secrets Docker détectés: push activé"

      - name: Log in to Docker Hub
        if: steps.docker-auth.outputs.can_push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.docker-auth.outputs.image_name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
            type=sha,prefix=sha-,enable=${{ github.event_name != 'pull_request' }}
            type=ref,event=branch,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr,enable=${{ github.event_name == 'pull_request' }}

      - name: Build Docker image (no push)
        if: steps.docker-auth.outputs.can_push != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64

      - name: Build and push Docker image
        if: steps.docker-auth.outputs.can_push == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/popcorn-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/popcorn-frontend:buildcache,mode=max
          platforms: linux/amd64,linux/arm64
