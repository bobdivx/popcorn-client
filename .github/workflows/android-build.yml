name: Build Android APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:  # Permet de déclencher manuellement depuis l'interface GitHub

jobs:
  build-android:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro frontend
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          build-tools: 33.0.0
          ndk-version: 25.1.8937393

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Setup Android environment variables
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/tools" >> $GITHUB_PATH
          # Set NDK_HOME to match ANDROID_NDK_HOME for Tauri compatibility
          echo "NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV

      - name: Initialize Android project
        run: |
          echo "Checking if Android project exists..."
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_NDK_HOME: $ANDROID_NDK_HOME"
          echo "NDK_HOME: $NDK_HOME"
          if [ ! -d "src-tauri/gen/android" ]; then
            echo "Android project not found, initializing..."
            npx tauri android init --ci --config src-tauri/tauri.android.mobile.conf.json
            echo "Android project initialized"
          else
            echo "Android project already exists"
          fi
          ls -la src-tauri/gen/ || echo "gen directory does not exist"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
          CARGO_TERM_COLOR: always

      - name: Build Android APK
        run: npm run tauri:build:android-mobile
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
          CARGO_TERM_COLOR: always

      - name: Find APK file
        id: find-apk
        run: |
          # Chercher dans le répertoire bundle/apk (emplacement standard Tauri)
          APK_PATH=$(find src-tauri/target/aarch64-linux-android/release/bundle/apk -name "*.apk" -type f 2>/dev/null | head -n 1)
          if [ -z "$APK_PATH" ]; then
            # Fallback: chercher dans release
            APK_PATH=$(find src-tauri/target/aarch64-linux-android/release -name "*.apk" -type f 2>/dev/null | head -n 1)
          fi
          if [ -z "$APK_PATH" ]; then
            # Fallback: chercher dans debug
            APK_PATH=$(find src-tauri/target/aarch64-linux-android/debug -name "*.apk" -type f 2>/dev/null | head -n 1)
          fi
          if [ -z "$APK_PATH" ]; then
            # Dernier fallback: chercher partout
            APK_PATH=$(find . -name "*.apk" -type f 2>/dev/null | head -n 1)
          fi
          if [ -z "$APK_PATH" ]; then
            echo "❌ Aucun APK trouvé!"
            exit 1
          fi
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "✅ APK trouvé: $APK_PATH"
          ls -lh "$APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: popcorn-android-mobile
          path: ${{ steps.find-apk.outputs.path }}
          retention-days: 30

      - name: Generate release tag
        id: release-tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG="nightly-$(date +%Y%m%d)-${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          name: "Popcorn Android Mobile - ${{ steps.release-tag.outputs.tag }}"
          body: |
            ## Popcorn Android Mobile APK
            
            **Version:** ${{ steps.release-tag.outputs.tag }}
            **Commit:** ${{ github.sha }}
            **Build Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
            
            ### Installation
            1. Téléchargez le fichier APK ci-dessous
            2. Activez l'installation depuis des sources inconnues dans les paramètres Android
            3. Installez l'APK
            
            ### Notes
            - Cette version est pour Android Mobile (téléphones et tablettes)
            - Architecture: aarch64
          files: ${{ steps.find-apk.outputs.path }}
          draft: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
