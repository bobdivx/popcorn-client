name: Build Android APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:  # Permet de déclencher manuellement depuis l'interface GitHub

jobs:
  build-android:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro frontend
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-33 build-tools;33.0.0 ndk;25.2.9519653'

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Setup NDK environment variables
        run: |
          # Find NDK directory (try specific version first, then any version)
          NDK_PATH=$(find $ANDROID_HOME/ndk -maxdepth 1 -type d -name "25.2.9519653" 2>/dev/null | head -n 1)
          if [ -z "$NDK_PATH" ]; then
            # Fallback: find any NDK version
            NDK_PATH=$(find $ANDROID_HOME/ndk -maxdepth 1 -type d 2>/dev/null | head -n 1)
          fi
          if [ -n "$NDK_PATH" ]; then
            echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
            echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
            echo "Found NDK at: $NDK_PATH"
          else
            echo "Warning: NDK not found in $ANDROID_HOME/ndk"
            ls -la $ANDROID_HOME/ndk/ || echo "NDK directory does not exist"
          fi

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Setup Android environment variables
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/tools" >> $GITHUB_PATH

      - name: Initialize Android project
        run: |
          echo "Checking if Android project exists..."
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_NDK_HOME: $ANDROID_NDK_HOME"
          echo "NDK_HOME: $NDK_HOME"
          if [ ! -d "src-tauri/gen/android" ]; then
            echo "Android project not found, initializing..."
            npx tauri android init --ci --config src-tauri/tauri.android.mobile.conf.json
            echo "Android project initialized"
          else
            echo "Android project already exists"
          fi
          ls -la src-tauri/gen/ || echo "gen directory does not exist"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
          CARGO_TERM_COLOR: always

      - name: Setup signing keystore
        run: |
          echo "🔐 Configuration de la signature native..."
          ANDROID_DIR="src-tauri/gen/android"
          
          # Créer le répertoire si nécessaire
          mkdir -p "$ANDROID_DIR"
          
          # Option 1: Utiliser un keystore existant depuis les secrets (base64 encodé)
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "📥 Décodage du keystore depuis les secrets..."
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$ANDROID_DIR/keystore.jks"
            echo "✅ Keystore décodé"
          else
            echo "⚠️  Aucun keystore dans les secrets, création d'un nouveau keystore..."
            KEYTOOL="$JAVA_HOME/bin/keytool"
            if [ ! -f "$KEYTOOL" ]; then
              KEYTOOL="keytool"
            fi
            
            # Créer un keystore avec les secrets ou valeurs par défaut
            KEYSTORE_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            KEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}"
            
            if [ -z "$KEYSTORE_PASSWORD" ]; then
              KEYSTORE_PASSWORD="changeit"
              KEY_PASSWORD="changeit"
              echo "⚠️  Utilisation d'un mot de passe par défaut (changez-le dans les secrets GitHub!)"
            fi
            
            $KEYTOOL -genkeypair -noprompt \
              -keystore "$ANDROID_DIR/keystore.jks" \
              -storepass "$KEYSTORE_PASSWORD" \
              -keypass "$KEY_PASSWORD" \
              -alias "popcorn-key" \
              -dname "CN=Popcorn Client, OU=Development, O=Popcorn, L=Unknown, ST=Unknown, C=FR" \
              -keyalg RSA -keysize 2048 -validity 9125
            echo "✅ Keystore créé"
          fi
          
          # Créer le fichier keystore.properties
          KEYSTORE_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          KEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}"
          
          if [ -z "$KEYSTORE_PASSWORD" ]; then
            KEYSTORE_PASSWORD="changeit"
            KEY_PASSWORD="changeit"
          fi
          
          cat > "$ANDROID_DIR/keystore.properties" << EOF
          # Configuration du keystore pour la signature de l'APK
          # Généré automatiquement par GitHub Actions
          
          storeFile=keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=popcorn-key
          keyPassword=$KEY_PASSWORD
          EOF
          
          echo "✅ Fichier keystore.properties créé"
          echo "📋 Configuration:"
          echo "   - Keystore: $ANDROID_DIR/keystore.jks"
          echo "   - Alias: popcorn-key"
          echo "   - Fichier properties: $ANDROID_DIR/keystore.properties"

      - name: Apply signing configuration to build.gradle.kts
        run: |
          echo "🔧 Application de la configuration de signature..."
          BUILD_GRADLE="src-tauri/gen/android/app/build.gradle.kts"
          
          if [ ! -f "$BUILD_GRADLE" ]; then
            echo "⚠️  build.gradle.kts non trouvé, attente..."
            # Attendre que Tauri génère le fichier
            for i in {1..30}; do
              if [ -f "$BUILD_GRADLE" ]; then
                break
              fi
              sleep 1
            done
          fi
          
          if [ ! -f "$BUILD_GRADLE" ]; then
            echo "❌ build.gradle.kts introuvable après attente"
            exit 1
          fi
          
          # Vérifier si la configuration existe déjà
          if grep -q "signingConfigs" "$BUILD_GRADLE"; then
            echo "✅ Configuration de signature déjà présente"
          else
            echo "📝 Ajout de la configuration de signature..."
            
            # Créer un script Python temporaire pour modifier le fichier
            cat > /tmp/apply_signing.py << 'PYTHON_SCRIPT'
          import re
          import sys
          
          file_path = sys.argv[1]
          
          with open(file_path, 'r', encoding='utf-8') as f:
              content = f.read()
          
          # Vérifier si signingConfigs existe déjà
          if 'signingConfigs' in content:
              print("Configuration déjà présente")
              sys.exit(0)
          
          # Configuration de signature à insérer
          signing_config = '''
    // Configuration de la signature
    signingConfigs {
        create("release") {
            val keystorePropertiesFile = rootProject.file("keystore.properties")
            if (keystorePropertiesFile.exists()) {
                val keystoreProperties = Properties()
                keystoreProperties.load(keystorePropertiesFile.inputStream())
                // Résoudre le chemin du keystore depuis la racine du projet (rootProject)
                val keystoreFileName = keystoreProperties["storeFile"] as String
                storeFile = rootProject.file(keystoreFileName)
                storePassword = keystoreProperties["storePassword"] as String
                keyAlias = keystoreProperties["keyAlias"] as String
                keyPassword = keystoreProperties["keyPassword"] as String
            } else {
                // Utiliser les variables d'environnement si le fichier n'existe pas
                val keystorePath = System.getenv("ANDROID_KEYSTORE_PATH") ?: ""
                val keystorePassword = System.getenv("ANDROID_KEYSTORE_PASSWORD") ?: ""
                val keyAlias = System.getenv("ANDROID_KEY_ALIAS") ?: "popcorn-key"
                val keyPassword = System.getenv("ANDROID_KEY_PASSWORD") ?: keystorePassword
                
                if (keystorePath.isNotEmpty() && keystorePassword.isNotEmpty()) {
                    // Vérifier si le chemin est absolu (Windows: contient ':', Unix: commence par '/')
                    val isAbsolute = keystorePath.contains(":") || keystorePath.startsWith("/")
                    val keystoreFile = if (isAbsolute) {
                        file(keystorePath)
                    } else {
                        rootProject.file(keystorePath)
                    }
                    if (keystoreFile.exists()) {
                        storeFile = keystoreFile
                        storePassword = keystorePassword
                        this.keyAlias = keyAlias
                        this.keyPassword = keyPassword
                    }
                }
            }
        }
    }
    '''
          
          # Insérer après compileOptions et avant buildTypes
          pattern = r'(compileOptions \{[^}]*\})\s*(buildTypes)'
          replacement = r'\1' + signing_config + r'\n    \2'
          
          new_content = re.sub(pattern, replacement, content)
          
          # Ajouter signingConfig au buildType release
          release_pattern = r'(getByName\("release"\) \{[^}]*)(isMinifyEnabled = true)'
          release_replacement = r'\1\n            signingConfig = signingConfigs.getByName("release")\n            \2'
          
          new_content = re.sub(release_pattern, release_replacement, new_content)
          
          with open(file_path, 'w', encoding='utf-8') as f:
              f.write(new_content)
          
          print("✅ Configuration de signature appliquée")
          PYTHON_SCRIPT
            python3 /tmp/apply_signing.py "$BUILD_GRADLE"
            
            echo "✅ Configuration appliquée avec succès"
          fi

      - name: Build Android APK
        run: npm run tauri:build:android-mobile
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
          CARGO_TERM_COLOR: always

      - name: Find APK file
        id: find-apk
        run: |
          echo "🔍 Recherche de l'APK généré..."
          echo "Recherche dans les emplacements possibles..."
          
          # 1. Chercher dans gen/android/app/build/outputs/apk (emplacement Gradle standard)
          # On accepte les unsigned car on les signera après, mais on les marque clairement
          APK_PATH=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -type f 2>/dev/null | grep -v "unsigned" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            # Si aucun APK signé, prendre l'unsigned (on le signera)
            APK_PATH=$(find src-tauri/gen/android/app/build/outputs/apk -name "*unsigned*.apk" -type f 2>/dev/null | head -n 1)
            if [ -n "$APK_PATH" ]; then
              echo "⚠️  APK unsigned trouvé dans gen/android/app/build/outputs/apk (sera signé)"
              echo "   IMPORTANT: Cet APK sera signé dans l'étape suivante"
            fi
          else
            echo "✅ APK trouvé dans gen/android/app/build/outputs/apk"
          fi
          
          # 2. Chercher dans bundle/apk (emplacement Tauri standard)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find src-tauri/target/aarch64-linux-android/release/bundle/apk -name "*.apk" -type f 2>/dev/null | head -n 1)
            if [ -n "$APK_PATH" ]; then
              echo "✅ APK trouvé dans bundle/apk"
            fi
          fi
          
          # 3. Chercher dans release
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find src-tauri/target/aarch64-linux-android/release -name "*.apk" -type f 2>/dev/null | grep -v "unsigned" | head -n 1)
            if [ -z "$APK_PATH" ]; then
              APK_PATH=$(find src-tauri/target/aarch64-linux-android/release -name "*unsigned*.apk" -type f 2>/dev/null | head -n 1)
              if [ -n "$APK_PATH" ]; then
                echo "⚠️  APK unsigned trouvé dans release (sera signé)"
              fi
            else
              echo "✅ APK trouvé dans release"
            fi
          fi
          
          # 4. Chercher dans debug
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find src-tauri/target/aarch64-linux-android/debug -name "*.apk" -type f 2>/dev/null | grep -v "unsigned" | head -n 1)
            if [ -z "$APK_PATH" ]; then
              APK_PATH=$(find src-tauri/target/aarch64-linux-android/debug -name "*unsigned*.apk" -type f 2>/dev/null | head -n 1)
              if [ -n "$APK_PATH" ]; then
                echo "⚠️  APK unsigned trouvé dans debug (sera signé)"
              fi
            else
              echo "✅ APK trouvé dans debug"
            fi
          fi
          
          # 5. Dernier fallback: chercher partout (sauf node_modules et .git)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find . -name "*.apk" -type f -not -path "*/node_modules/*" -not -path "*/.git/*" 2>/dev/null | grep -v "unsigned" | head -n 1)
            if [ -z "$APK_PATH" ]; then
              APK_PATH=$(find . -name "*unsigned*.apk" -type f -not -path "*/node_modules/*" -not -path "*/.git/*" 2>/dev/null | head -n 1)
              if [ -n "$APK_PATH" ]; then
                echo "⚠️  APK unsigned trouvé ailleurs (sera signé)"
              fi
            else
              echo "✅ APK trouvé ailleurs"
            fi
          fi
          
          if [ -z "$APK_PATH" ]; then
            echo "❌ Aucun APK trouvé!"
            echo "Recherche dans les répertoires..."
            echo "gen/android/app/build/outputs/apk:"
            ls -la src-tauri/gen/android/app/build/outputs/apk/ 2>/dev/null || echo "  (n'existe pas)"
            echo "target/aarch64-linux-android/release/bundle/apk:"
            ls -la src-tauri/target/aarch64-linux-android/release/bundle/apk/ 2>/dev/null || echo "  (n'existe pas)"
            echo "target/aarch64-linux-android/release:"
            ls -la src-tauri/target/aarch64-linux-android/release/*.apk 2>/dev/null || echo "  (aucun APK)"
            exit 1
          fi
          
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "✅ APK trouvé: $APK_PATH"
          ls -lh "$APK_PATH"
          echo "Taille: $(du -h "$APK_PATH" | cut -f1)"

      - name: Verify native signed APK
        run: |
          APK_PATH="${{ steps.find-apk.outputs.path }}"
          echo "🔍 Vérification de l'APK signé nativement: $APK_PATH"
          
          # Trouver les outils Android
          BUILD_TOOLS=$(find $ANDROID_HOME/build-tools -maxdepth 1 -type d | sort -V | tail -n 1)
          APKSIGNER="$BUILD_TOOLS/apksigner"
          ZIPALIGN="$BUILD_TOOLS/zipalign"
          
          if [ ! -f "$APKSIGNER" ] || [ ! -f "$ZIPALIGN" ]; then
            echo "⚠️  Outils de vérification introuvables, vérification ignorée"
            exit 0
          fi
          
          # Vérifier la signature native (l'APK devrait déjà être signé par Gradle)
          echo "🔐 Vérification de la signature native..."
          if $APKSIGNER verify "$APK_PATH" > /dev/null 2>&1; then
            echo "✅ APK signé nativement avec succès"
            $APKSIGNER verify --print-certs "$APK_PATH" | head -n 5
          else
            echo "❌ ERREUR CRITIQUE: L'APK n'est pas signé ou la signature est invalide!"
            echo "   Chemin: $APK_PATH"
            echo "   L'APK doit être signé nativement par Gradle avec le keystore de production"
            exit 1
          fi
          
          # Vérifier l'alignement
          echo "📐 Vérification de l'alignement..."
          if $ZIPALIGN -c 4 "$APK_PATH" > /dev/null 2>&1; then
            echo "✅ APK correctement aligné"
          else
            echo "⚠️  APK non aligné (non bloquant mais recommandé)"
            # Aligner si nécessaire (sans re-signer)
            ALIGNED_APK="${APK_PATH}.aligned"
            if $ZIPALIGN -f 4 "$APK_PATH" "$ALIGNED_APK" > /dev/null 2>&1; then
              mv "$ALIGNED_APK" "$APK_PATH"
              echo "✅ APK aligné (signature préservée)"
            fi
          fi
          
          # Vérification finale obligatoire
          echo "🔍 Vérification finale..."
          if $APKSIGNER verify "$APK_PATH" > /dev/null 2>&1; then
            echo "✅ APK valide et prêt pour l'installation"
            echo "   Signature: Native (keystore de production)"
          else
            echo "❌ ERREUR CRITIQUE: L'APK final n'est pas signé!"
            echo "   Chemin: $APK_PATH"
            exit 1
          fi

      - name: Rename APK with correct format
        id: rename-apk
        run: |
          APK_PATH="${{ steps.find-apk.outputs.path }}"
          
          # Vérifier que l'APK est bien signé avant de le renommer
          BUILD_TOOLS=$(find $ANDROID_HOME/build-tools -maxdepth 1 -type d | sort -V | tail -n 1)
          APKSIGNER="$BUILD_TOOLS/apksigner"
          
          if [ -f "$APKSIGNER" ]; then
            if ! $APKSIGNER verify "$APK_PATH" > /dev/null 2>&1; then
              echo "❌ ERREUR: L'APK n'est pas signé avant le renommage!"
              echo "   Chemin: $APK_PATH"
              exit 1
            fi
            echo "✅ APK vérifié: signature valide"
          fi
          
          # Lire la version depuis tauri.android.mobile.conf.json
          PRODUCT_NAME=$(jq -r '.productName' src-tauri/tauri.android.mobile.conf.json)
          VERSION=$(jq -r '.version' src-tauri/tauri.android.mobile.conf.json)
          
          # Nettoyer le nom (remplacer les espaces par des underscores)
          SAFE_NAME=$(echo "$PRODUCT_NAME" | sed 's/ /_/g')
          
          # Nouveau nom: Popcorn_Mobile-v1.0.1.apk (sans -android-mobile)
          NEW_APK_NAME="${SAFE_NAME}-v${VERSION}.apk"
          
          # Créer un dossier temporaire pour le fichier final avec le bon nom
          FINAL_APK_DIR="./release-apk"
          mkdir -p "$FINAL_APK_DIR"
          NEW_APK_PATH="$FINAL_APK_DIR/$NEW_APK_NAME"
          
          echo "📝 Copie de l'APK signé avec le nouveau nom..."
          echo "   Ancien: $(basename "$APK_PATH")"
          echo "   Nouveau: $NEW_APK_NAME"
          
          # Copier (pas renommer) pour garder l'original si nécessaire
          cp "$APK_PATH" "$NEW_APK_PATH"
          
          # Vérifier que la copie est bien signée
          if [ -f "$APKSIGNER" ]; then
            if $APKSIGNER verify "$NEW_APK_PATH" > /dev/null 2>&1; then
              echo "✅ APK copié et vérifié: signature valide"
            else
              echo "❌ ERREUR: L'APK copié n'est pas signé!"
              exit 1
            fi
          fi
          
          echo "path=$NEW_APK_PATH" >> $GITHUB_OUTPUT
          echo "name=$NEW_APK_NAME" >> $GITHUB_OUTPUT
          echo "✅ APK prêt pour upload: $NEW_APK_NAME"

      - name: Verify final APK before upload
        run: |
          APK_PATH="${{ steps.rename-apk.outputs.path }}"
          APK_NAME="${{ steps.rename-apk.outputs.name }}"
          
          echo "🔍 Vérification finale de l'APK avant upload..."
          echo "   Chemin: $APK_PATH"
          echo "   Nom: $APK_NAME"
          
          if [ ! -f "$APK_PATH" ]; then
            echo "❌ ERREUR: L'APK n'existe pas: $APK_PATH"
            exit 1
          fi
          
          # Vérifier que le nom ne contient pas "unsigned"
          if echo "$APK_NAME" | grep -qi "unsigned"; then
            echo "❌ ERREUR: Le nom de l'APK contient 'unsigned': $APK_NAME"
            exit 1
          fi
          
          # Vérifier la signature
          BUILD_TOOLS=$(find $ANDROID_HOME/build-tools -maxdepth 1 -type d | sort -V | tail -n 1)
          APKSIGNER="$BUILD_TOOLS/apksigner"
          
          if [ -f "$APKSIGNER" ]; then
            if $APKSIGNER verify "$APK_PATH" > /dev/null 2>&1; then
              echo "✅ APK signé et prêt pour l'upload"
              $APKSIGNER verify --print-certs "$APK_PATH" | head -n 3
            else
              echo "❌ ERREUR: L'APK final n'est pas signé!"
              exit 1
            fi
          else
            echo "⚠️  apksigner introuvable, vérification de signature ignorée"
          fi
          
          echo "✅ APK validé: $APK_NAME"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: popcorn-android-mobile
          path: ${{ steps.rename-apk.outputs.path }}
          retention-days: 30
          if-no-files-found: error

      - name: Display APK info
        run: |
          APK_PATH="${{ steps.rename-apk.outputs.path }}"
          echo "📦 Informations sur l'APK:"
          echo "   Chemin: $APK_PATH"
          echo "   Taille: $(du -h "$APK_PATH" | cut -f1)"
          echo "   Date: $(stat -c %y "$APK_PATH" 2>/dev/null || stat -f "%Sm" "$APK_PATH" 2>/dev/null || echo "N/A")"
          echo ""
          echo "✅ L'APK est disponible dans:"
          echo "   1. Artifacts GitHub (onglet Actions de ce workflow)"
          echo "   2. Release GitHub (si une release est créée)"

      - name: Generate release tag
        id: release-tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG="nightly-$(date +%Y%m%d)-${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"

      - name: Create Git tag
        if: startsWith(github.ref, 'refs/heads/')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f ${{ steps.release-tag.outputs.tag }} || git tag ${{ steps.release-tag.outputs.tag }}
          git push origin ${{ steps.release-tag.outputs.tag }} || echo "Tag already exists or push failed"

      - name: Verify APK before release upload
        run: |
          APK_PATH="${{ steps.rename-apk.outputs.path }}"
          APK_NAME="${{ steps.rename-apk.outputs.name }}"
          
          echo "🔍 Vérification finale avant upload dans la release..."
          echo "   Chemin: $APK_PATH"
          echo "   Nom attendu: $APK_NAME"
          
          if [ ! -f "$APK_PATH" ]; then
            echo "❌ ERREUR CRITIQUE: L'APK n'existe pas: $APK_PATH"
            exit 1
          fi
          
          # Vérifier que le nom du fichier correspond
          ACTUAL_NAME=$(basename "$APK_PATH")
          if [ "$ACTUAL_NAME" != "$APK_NAME" ]; then
            echo "❌ ERREUR: Le nom du fichier ne correspond pas!"
            echo "   Attendu: $APK_NAME"
            echo "   Trouvé: $ACTUAL_NAME"
            exit 1
          fi
          
          # Vérifier que le nom ne contient pas "unsigned"
          if echo "$ACTUAL_NAME" | grep -qi "unsigned"; then
            echo "❌ ERREUR CRITIQUE: Le nom de l'APK contient 'unsigned': $ACTUAL_NAME"
            exit 1
          fi
          
          # Vérifier la signature une dernière fois
          BUILD_TOOLS=$(find $ANDROID_HOME/build-tools -maxdepth 1 -type d | sort -V | tail -n 1)
          APKSIGNER="$BUILD_TOOLS/apksigner"
          
          if [ -f "$APKSIGNER" ]; then
            if $APKSIGNER verify "$APK_PATH" > /dev/null 2>&1; then
              echo "✅ APK signé et validé: $ACTUAL_NAME"
              echo "   Taille: $(du -h "$APK_PATH" | cut -f1)"
            else
              echo "❌ ERREUR CRITIQUE: L'APK n'est pas signé!"
              exit 1
            fi
          fi
          
          echo "✅ APK prêt pour la release: $ACTUAL_NAME"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          name: "${{ steps.release-tag.outputs.tag }}"
          body: |
            **Version:** ${{ steps.release-tag.outputs.tag }}
            **Commit:** ${{ github.sha }}
            **Build Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          files: ${{ steps.rename-apk.outputs.path }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
