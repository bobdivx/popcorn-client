name: WebOS Build (IPK)

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:  # Permet de déclencher manuellement depuis l'interface GitHub

jobs:
  # Job 1: Build frontend Astro
  build-frontend:
    runs-on: self-hosted
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Node.js (pre-installed)
        run: |
          node --version
          npm --version
          echo "✅ Node.js et npm sont déjà installés dans le runner"

      - name: Fix npm cache permissions
        run: |
          # Arrêter tous les processus npm qui pourraient utiliser le cache
          pkill -9 npm || true
          sleep 2
          
          # Trouver et tuer les processus qui utilisent le dossier .npm
          if command -v fuser &> /dev/null; then
            sudo fuser -k "$HOME/.npm" 2>/dev/null || true
            sleep 1
          fi
          
          # Utiliser npm cache clean si possible
          npm cache clean --force 2>/dev/null || true
          
          # Corriger les permissions du dossier .npm (sans supprimer le dossier)
          if [ -d "$HOME/.npm" ]; then
            # Corriger les permissions du dossier parent
            sudo chown -R $(id -u):$(id -g) "$HOME/.npm" 2>/dev/null || true
            sudo chmod -R u+w "$HOME/.npm" 2>/dev/null || true
            
            # Supprimer seulement le contenu du cache, pas le dossier lui-même
            rm -rf "$HOME/.npm/_cacache"/* "$HOME/.npm/_logs"/* 2>/dev/null || true
            sudo rm -rf "$HOME/.npm/_cacache"/* "$HOME/.npm/_logs"/* 2>/dev/null || true
          fi
          
          # Créer les dossiers nécessaires avec les bonnes permissions
          mkdir -p "$HOME/.npm/_cacache" "$HOME/.npm/_logs"
          chmod -R u+w "$HOME/.npm" 2>/dev/null || sudo chmod -R u+w "$HOME/.npm" 2>/dev/null || true
          
          # Vérifier que les permissions sont correctes
          if [ -w "$HOME/.npm/_cacache" ] && [ -w "$HOME/.npm/_logs" ]; then
            echo "✅ Cache npm configuré avec les bonnes permissions"
          else
            echo "⚠️ Permissions npm partiellement corrigées, mais devrait fonctionner"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build Astro frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: popcorn-frontend-dist
          path: dist/
          retention-days: 7

  # Job 2: Prepare WebOS structure
  prepare-webos:
    needs: build-frontend
    runs-on: self-hosted
    environment: production
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: popcorn-frontend-dist
          path: dist/

      - name: Increment client version in VERSION.json
        id: increment_version
        if: github.event_name != 'pull_request' && !startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ -f "VERSION.json" ]; then
            # Lire la version actuelle
            CURRENT_VERSION=$(jq -r '.client.version' VERSION.json)
            echo "📦 Version actuelle: ${CURRENT_VERSION}"
            
            # Extraire les parties de la version (major.minor.patch)
            IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
            
            # Incrémenter le patch
            patch=$((patch + 1))
            
            # Gérer le rollover
            if [ $patch -ge 100 ]; then
              patch=0
              minor=$((minor + 1))
            fi
            if [ $minor -ge 100 ]; then
              minor=0
              major=$((major + 1))
            fi
            
            NEW_VERSION="${major}.${minor}.${patch}"
            echo "🚀 Nouvelle version: ${NEW_VERSION}"
            
            # Mettre à jour VERSION.json
            jq --arg v "$NEW_VERSION" '.client.version = $v' VERSION.json > VERSION.json.tmp
            mv VERSION.json.tmp VERSION.json
            
            # Incrémenter aussi le build number
            BUILD=$(jq -r '.client.build' VERSION.json)
            BUILD=$((BUILD + 1))
            jq --argjson b "$BUILD" '.client.build = $b' VERSION.json > VERSION.json.tmp
            mv VERSION.json.tmp VERSION.json
            
            echo "✅ Version incrémentée: ${CURRENT_VERSION} → ${NEW_VERSION} (build: ${BUILD})"
            echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
            echo "build=${BUILD}" >> $GITHUB_OUTPUT
          else
            echo "⚠️ VERSION.json introuvable, création avec version par défaut"
            echo '{"client":{"version":"1.0.1","build":1},"server":{"version":"1.0.1","build":1}}' > VERSION.json
            echo "version=1.0.1" >> $GITHUB_OUTPUT
            echo "build=1" >> $GITHUB_OUTPUT
          fi

      - name: Resolve version (increment ou VERSION.json)
        id: resolve_version
        run: |
          if [ -n "${{ steps.increment_version.outputs.version }}" ]; then
            VERSION="${{ steps.increment_version.outputs.version }}"
          else
            VERSION=$(jq -r '.client.version' VERSION.json)
          fi
          echo "$VERSION" > release-version.txt
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 Version: $VERSION"

      - name: Prepare WebOS structure
        run: |
          mkdir -p webos/frontend
          cp -r dist/* webos/frontend/
          cp src-tauri/icons/icon.png webos/icon.png
          cp src-tauri/icons/icon.png webos/icon-large.png
          jq --arg version "${{ steps.resolve_version.outputs.version }}" '.version = $version' webos/appinfo.json > webos/appinfo.json.tmp
          mv webos/appinfo.json.tmp webos/appinfo.json
          echo "✅ Structure WebOS préparée"

      - name: Commit version update
        if: github.event_name != 'pull_request' && !startsWith(github.ref, 'refs/tags/v') && steps.increment_version.outputs.version != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION.json
          git commit -m "chore: bump client version to ${{ steps.increment_version.outputs.version }}" || echo "Aucun changement à commiter"
          git push || echo "Push échoué (peut-être déjà à jour)"

      - name: Upload WebOS structure artifact
        uses: actions/upload-artifact@v4
        with:
          name: popcorn-webos-structure
          path: webos/
          retention-days: 7

      - name: Upload release version artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-version
          path: release-version.txt
          retention-days: 1

  # Job 3: Build IPK with ares-package
  build-ipk:
    needs: prepare-webos
    runs-on: self-hosted
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Node.js (pre-installed)
        run: |
          node --version
          npm --version
          echo "✅ Node.js et npm sont déjà installés dans le runner"

      - name: Download WebOS structure artifact
        uses: actions/download-artifact@v4
        with:
          name: popcorn-webos-structure
          path: webos/

      - name: Build IPK manually
        run: |
          echo "📦 Création manuelle de l'IPK WebOS..."
          
          # Vérifier que le dossier webos existe
          if [ ! -d "webos" ]; then
            echo "❌ Le dossier webos n'existe pas!"
            exit 1
          fi
          
          # Vérifier que appinfo.json existe
          if [ ! -f "webos/appinfo.json" ]; then
            echo "❌ appinfo.json introuvable dans webos/"
            exit 1
          fi
          
          # Vérifier que le frontend existe
          if [ ! -d "webos/frontend" ]; then
            echo "❌ Le dossier webos/frontend n'existe pas!"
            exit 1
          fi
          
          # Lire les informations de l'application
          APP_ID=$(jq -r '.id' webos/appinfo.json)
          APP_VERSION=$(jq -r '.version' webos/appinfo.json)
          echo "📱 App ID: $APP_ID"
          echo "📱 Version: $APP_VERSION"
          
          # Créer le répertoire temporaire pour le packaging
          TEMP_DIR=$(mktemp -d)
          IPK_NAME="${APP_ID}_${APP_VERSION}_all.ipk"
          
          echo "📁 Préparation du package dans $TEMP_DIR..."
          
          # Structure WebOS IPK : les fichiers doivent être à la RACINE de data.tar.gz
          # PAS dans /usr/palm/applications/
          mkdir -p "$TEMP_DIR/data"
          cp -r webos/* "$TEMP_DIR/data/"
          
          # Afficher la structure pour debug
          echo "📂 Structure de data/:"
          ls -la "$TEMP_DIR/data/"
          
          # Créer le fichier control
          mkdir -p "$TEMP_DIR/control"
          INSTALLED_SIZE=$(du -sk webos | cut -f1)
          {
            echo "Package: $APP_ID"
            echo "Version: $APP_VERSION"
            echo "Section: misc"
            echo "Priority: optional"
            echo "Architecture: all"
            echo "Installed-Size: $INSTALLED_SIZE"
            echo "Maintainer: Popcorn Team"
            echo "Description: Popcorn Client for WebOS"
            echo "webOS-Package-Format-Version: 2"
            echo "webOS-Packager-Version: x.x.x"
          } > "$TEMP_DIR/control/control"
          
          # Créer les archives tar (les fichiers doivent être à la racine)
          echo "📦 Création des archives..."
          cd "$TEMP_DIR/data"
          tar -czf ../data.tar.gz .
          cd "$TEMP_DIR/control"
          tar -czf ../control.tar.gz .
          cd "$TEMP_DIR"
          
          # Vérifier le contenu de data.tar.gz
          echo "📂 Contenu de data.tar.gz:"
          tar -tzf data.tar.gz | head -20
          
          # Créer le fichier debian-binary
          echo "2.0" > debian-binary
          
          # Créer l'IPK (qui est un ar archive)
          # L'ordre est important : debian-binary DOIT être en premier
          echo "📦 Création de l'IPK..."
          ar -r "$IPK_NAME" debian-binary control.tar.gz data.tar.gz
          
          # Copier l'IPK dans le dossier webos
          cp "$IPK_NAME" "$GITHUB_WORKSPACE/webos/"
          
          # Nettoyer
          rm -rf "$TEMP_DIR"
          
          echo "✅ IPK créé: webos/$IPK_NAME"
          ls -la "$GITHUB_WORKSPACE/webos/"*.ipk

      - name: Find IPK file
        id: find-ipk
        run: |
          IPK_FILE=$(find webos -name "*.ipk" -type f | head -n 1)
          if [ -z "$IPK_FILE" ]; then
            echo "❌ Aucun fichier IPK trouvé!"
            exit 1
          fi
          
          IPK_NAME=$(basename "$IPK_FILE")
          echo "path=$IPK_FILE" >> $GITHUB_OUTPUT
          echo "name=$IPK_NAME" >> $GITHUB_OUTPUT
          echo "✅ IPK trouvé: $IPK_NAME"

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: popcorn-webos-ipk
          path: ${{ steps.find-ipk.outputs.path }}
          retention-days: 90

  # Job 4: Create GitHub Release
  create-release:
    needs: [build-ipk]
    runs-on: self-hosted
    environment: production
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release version artifact
        uses: actions/download-artifact@v4
        with:
          name: release-version
          path: .

      - name: Get version
        id: version
        run: |
          VERSION=$(cat release-version.txt)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Get build date and commit info
        id: build-info
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          COMMIT_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_FULL="${{ github.sha }}"
          echo "build_date=${BUILD_DATE}" >> $GITHUB_OUTPUT
          echo "commit_short=${COMMIT_SHORT}" >> $GITHUB_OUTPUT
          echo "commit_full=${COMMIT_FULL}" >> $GITHUB_OUTPUT

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v${{ steps.version.outputs.version }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Release tag: ${TAG}"

      - name: Download IPK artifact
        uses: actions/download-artifact@v4
        with:
          name: popcorn-webos-ipk
          path: ./artifacts

      - name: Check if GitHub CLI is available
        id: check-gh
        run: |
          if command -v gh &> /dev/null; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "✅ GitHub CLI est déjà installé"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⚠️ GitHub CLI n'est pas installé, tentative d'installation..."
            type -p curl >/dev/null || (apt update && apt install curl -y)
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
            && chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
            && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
            && apt update \
            && apt install gh -y || echo "❌ Impossible d'installer GitHub CLI"
          fi

      - name: Check if release exists
        id: check-release
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release $TAG already exists, will update it"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release $TAG does not exist, will create it"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }} - WebOS
          body: |
            ## WebOS Release ${{ steps.tag.outputs.tag }}

            **Version:** ${{ steps.version.outputs.version }}
            **Build Date:** ${{ steps.build-info.outputs.build_date }}
            **Commit:** ${{ steps.build-info.outputs.commit_short }} (${{ steps.build-info.outputs.commit_full }})

            ### Artifacts
            - IPK pour installation sur téléviseurs LG WebOS

            ### Installation
            1. Téléchargez le fichier `.ipk`
            2. Installez-le sur votre TV WebOS via Developer Mode ou via l'application Homebrew Channel

            ### Workflow
            [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          files: ./artifacts/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
