# Configuration nginx pour le frontend Popcorn (Docker)
# - absolute_redirect off : redirections relatives pour préserver le port
#   (ex. /setup → /setup/ reste sur origin, évite http://host/setup/ sans port → ERR_CONNECTION_REFUSED)
# - try_files : SPA + chemins Astro (/setup, /dashboard, etc.)

server {
    listen 80;
    listen [::]:80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    absolute_redirect off;

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|m3u8|ts|mp4|webm)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
